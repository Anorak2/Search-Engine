---
services:
  # Java API for site/search engine capabilities
  # -------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: development
    container_name: search-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
    ports:
      - "${API_PORT}:8001"
    volumes:
      - ./api:/src/api
    networks:
      - search-network
    depends_on:
      search-postgres:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  # Vue 3 Frontend
  # -------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: development
    ports:
      - "${FRONTEND_PORT}:5173"
    container_name: search-frontend
    volumes:
      - ./frontend:/app:Z
      - /app/node_modules
    networks:
      - search-network
    restart: unless-stopped

  # Postgres Database
  # -------------------------------------------------------
  search-postgres:
    image: postgres:16-alpine
    container_name: search-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - search_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s
    networks:
      - search-network

  # The Web Crawler's Node Coordinator
  # -------------------------------------------------------
  coordinator:
    build:
      context: .
      dockerfile: docker/web-crawler.Dockerfile
      target: development
    container_name: crawler-coordinator
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      NODE_TYPE: "coordinator"
    networks:
      - search-network
    ports:
      - "${COORD_PORT}:8001"
    depends_on:
      search-postgres:
        condition: service_healthy
        restart: true
    restart: unless-stopped
  worker1:
    build:
      context: .
      dockerfile: docker/web-crawler.Dockerfile
      target: development
    container_name: crawler-worker1
    environment:
      APP_ENV: ${APP_ENV}
      DEBUG: ${DEBUG}
      NODE_TYPE: "worker"
      COORD_LOCATION: "localhost:${COORD_PORT}"
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_URL: "jdbc:postgresql://${DB_HOSTNAME}:${DB_PORT}/${POSTGRES_DB}"
    networks:
      - search-network
    depends_on:
      search-postgres:
        condition: service_healthy
        restart: true
    restart: unless-stopped

networks:
  search-network:
    driver: bridge

volumes:
  search_data:
    driver: local
